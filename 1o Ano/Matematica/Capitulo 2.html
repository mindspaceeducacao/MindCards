<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capítulo 2 | Matemática</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" href="https://img.icons8.com/ios-filled/200/df9256/calculator.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --laranja: #df9256;
            --laranja-claro: #fff3e0;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --bg-site: #fffaf5;
            --grad-laranja: linear-gradient(135deg, #df9256 0%, #ffb74d 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-site); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- DECORAÇÕES DE FUNDO (MATEMÁTICA) --- */
        .bg-decor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .decor-item { position: absolute; font-weight: 800; color: var(--laranja); opacity: 0.12; animation: float 12s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(20px, -40px) rotate(15deg); } }

        /* --- HEADER --- */
        .top-bar { padding: 30px 8%; display: flex; align-items: center; justify-content: space-between; }
        .progress-box { background: white; padding: 15px 30px; border-radius: 40px; box-shadow: 0 10px 30px rgba(223, 146, 86, 0.1); display: flex; align-items: center; gap: 20px; }
        .bar-outer { width: 200px; height: 12px; background: #f0f0f0; border-radius: 20px; overflow: hidden; }
        .bar-inner { width: 0%; height: 100%; background: var(--grad-laranja); transition: 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 10px rgba(223, 146, 86, 0.4); }

        /* --- ZONA DO CARD --- */
        .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; perspective: 2000px; }
        .flip-card { width: 100%; max-width: 460px; height: 420px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .flip-card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 45px; border: 6px solid white; padding: 50px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 40px 80px rgba(223, 146, 86, 0.15);
        }

        .card-front { background: white; background-image: radial-gradient(#fff3e0 1px, transparent 1px); background-size: 20px 20px; }
        .card-back { background: var(--grad-laranja); color: white; transform: rotateY(180deg); border-color: rgba(255,255,255,0.3); }

        .text-wrap { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; width: 100%; }
        .text-content { font-size: clamp(1.5rem, 6vw, 2.8rem); font-weight: 800; line-height: 1.2; }

        .tag { background: var(--laranja-claro); color: var(--laranja); padding: 10px 25px; border-radius: 50px; font-weight: 800; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px; }
        .card-back .tag { background: rgba(255,255,255,0.2); color: white; }

        /* --- CONTROLES --- */
        .controls { padding: 40px 0 80px; display: flex; gap: 30px; align-items: center; }
        .btn-nav { width: 80px; height: 80px; border-radius: 30px; border: none; background: white; color: var(--laranja); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(0,0,0,0.06); transition: 0.4s; }
        .btn-nav:hover { transform: translateY(-8px) scale(1.05); background: var(--laranja); color: white; }

        /* --- FINALIZAÇÃO --- */
        .overlay-final { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 250, 245, 0.9); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-final { background: white; padding: 60px; border-radius: 60px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 30px 100px rgba(223, 146, 86, 0.2); animation: modalIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalIn { from { transform: translateY(50px) scale(0.9); opacity: 0; } }

        .btn-action { width: 100%; padding: 22px; border-radius: 30px; border: none; margin-top: 15px; font-family: 'Montserrat'; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--grad-laranja); color: white; box-shadow: 0 10px 25px rgba(223, 146, 86, 0.3); }
    </style>
</head>
<body>

    <div class="bg-decor">
        <div class="decor-item" style="top:10%; left:8%; font-size: 7rem;">+</div>
        <div class="decor-item" style="bottom:15%; right:5%; font-size: 6rem; animation-delay: 2s;">9</div>
        <div class="decor-item" style="top:45%; right:12%; font-size: 5rem; animation-delay: 4s;">=</div>
        <div class="decor-item" style="top:15%; right:25%; font-size: 4rem; animation-delay: 1s;">5</div>
    </div>

    <header class="top-bar">
        <a href="https://mindspaceeducacao.github.io/MindCards/1o%20Ano/Tela%20de%20Selecao" class="btn-nav" style="width:55px; height:55px; border-radius: 50%;"><span class="material-symbols-rounded">close</span></a>
        <div class="progress-box">
            <div class="bar-outer"><div class="bar-inner" id="progBar"></div></div>
            <span id="progText" style="font-weight: 800; font-size: 1rem; color: var(--laranja);">1 / 3</span>
        </div>
    </header>

    <main class="stage">
        <div class="flip-card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="tag">CALCULAR</div>
                <div class="text-wrap"><div class="text-content" id="qText"></div></div>
                <div style="margin-top: 30px; opacity: 0.2;"><span class="material-symbols-rounded" style="font-size: 40px;">touch_app</span></div>
            </div>
            <div class="card-face card-back">
                <div class="tag">RESULTADO</div>
                <div class="text-wrap"><div class="text-content" id="aText"></div></div>
            </div>
        </div>

        <footer class="controls">
            <button class="btn-nav" onclick="move(-1)"><span class="material-symbols-rounded" style="font-size: 35px;">chevron_left</span></button>
            <button class="btn-nav" onclick="move(1)" id="nextBtn"><span class="material-symbols-rounded" style="font-size: 35px;">chevron_right</span></button>
        </footer>
    </main>

    <div class="overlay-final" id="finalScreen">
        <div class="modal-final">
            <div style="font-size: 80px; margin-bottom: 20px;">➗</div>
            <h2 style="font-size: 2.2rem; font-weight: 800; color: var(--laranja); margin-bottom: 10px;">Gênio da Matemática!</h2>
            <p style="color: #777; font-weight: 600; margin-bottom: 40px;">Você resolveu todos os problemas com muita agilidade!</p>
            <button class="btn-action btn-primary" onclick="restart()">ESTUDAR DE NOVO</button>
            <button class="btn-action" style="background:#f0f0f0; color:#888;" onclick="window.location.href='https://mindspaceeducacao.github.io/MindCards/1o%20Ano/Tela%20de%20Selecao'">SAIR</button>
        </div>
    </div>

    <script>
        const cards = [
            { q: "Quais são as formas geométricas?", a: "Quadrado, retângulo, triângulo e círculo." },
            { q: "Uma placa de pare triangular tem formato de qual forma?", a: "Triângulo" },
            { q: "Uma porta tem o formato de...?", a: "Retângulo!" },
            { q: "Verdadeiro ou Falso: O círculo tem lados?", a: "Falso!" },
            { q: "Qual forma tem 4 lados iguais?", a: "O quadrado." },
            { q: "Quantos lados tem um triângulo?", a: "Ele tem 3 lados!" }
        ];

        let index = 0;
        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }

        function render() {
            const c = document.getElementById('card');
            c.classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('qText').innerText = cards[index].q;
                document.getElementById('aText').innerText = cards[index].a;
            }, 200);
            const p = ((index + 1) / cards.length) * 100;
            document.getElementById('progBar').style.width = p + '%';
            document.getElementById('progText').innerText = `${index + 1} / ${cards.length}`;
            
            document.getElementById('nextBtn').style.boxShadow = (index === cards.length - 1) ? "0 0 20px var(--laranja)" : "0 15px 35px rgba(0,0,0,0.06)";
        }

        function move(step) {
            if(index + step >= cards.length) { celebrate(); return; }
            if(index + step >= 0) { index += step; render(); }
        }

        function celebrate() {
            document.getElementById('finalScreen').style.display = 'flex';
            var end = Date.now() + 3000;
            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#df9256', '#ebb34b'] });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#df9256', '#ebb34b'] });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function restart() { index = 0; document.getElementById('finalScreen').style.display = 'none'; render(); }
        window.onload = render;
    </script>
</body>
</html>
